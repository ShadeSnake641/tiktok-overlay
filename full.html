<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hacky Sack Full Overlay</title>
  <link rel="stylesheet" href="style.css?v=20260313-2">
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="headline" id="headline"></div>
    <div class="label counter" id="currentText">
      <span id="currentLabelWave">Current Passes:</span> <span id="currentValue">0</span>
    </div>
    <div class="label" id="recordText">
      <span id="recordLabelWave">Record Passes:</span>
      <span class="editable-number" id="recordValue" contenteditable="true" spellcheck="false" aria-label="Record passes">0</span>
    </div>
    <div class="label" id="goalText">
      <span id="goalLabelWave">Goal:</span>
      <span class="editable-number" id="goalValue" contenteditable="true" spellcheck="false" aria-label="Goal passes">5</span>
      <span id="goalSuffixWave">Passes (</span><span id="goalPercent">0</span><span id="goalPercentSuffixWave">%)</span>
    </div>
    <div class="goal-progress" id="goalProgressTrack" aria-hidden="true">
      <div class="goal-progress-fill" id="goalProgressFill"></div>
    </div>
    <div class="event-layer" id="eventLayer"></div>
    <div class="sparkle-layer" id="sparkleLayer"></div>
  </div>
  <canvas id="confettiCanvas"></canvas>

  <script src="sync.js?v=20260313-2"></script>
  <script src="script.js?v=20260313-2"></script>
</body>
</html>
